name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff==0.11.4 mypy==1.15.0 pytest==8.3.5 pytest-cov==6.1.1 "moto[s3]==5.1.3" boto3==1.38.0 \
            psycopg2-binary==2.9.11 jinja2==3.1.6 aws-lambda-powertools==3.26.0 \
            "mcp[cli]==1.26.0" \
            "boto3-stubs[bedrock-runtime,s3,secretsmanager]==1.38.0"

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy type check
        run: mypy lambdas/
        env:
          PYTHONPATH: lambdas/shared/python

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short --cov=lambdas --cov-report=term-missing
        env:
          PYTHONPATH: lambdas/shared/python

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest==8.3.5 boto3==1.38.0 psycopg2-binary==2.9.11 aws-lambda-powertools==3.26.0 \
            "boto3-stubs[bedrock-runtime,s3,secretsmanager]==1.38.0"

      - name: Integration tests
        run: pytest tests/integration/ -v -m integration
        env:
          PYTHONPATH: lambdas/shared/python
          DB_CONNECTION_STRING: ${{ secrets.DEV_DB_CONNECTION_STRING }}
