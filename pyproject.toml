[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "e2e: marks tests as end-to-end tests (deselect with '-m \"not e2e\"')",
]

[tool.mypy]
strict = true
plugins = []
mypy_path = ["lambdas/shared/python", "lambdas/mcp"]
exclude = [
    "build/",
    "\\.terraform/",
    "lambdas/shared/python/psycopg2",
    "lambdas/shared/python/aws_lambda_powertools",
    "lambdas/site/jinja2",
    "lambdas/mcp/mcp",
]

[[tool.mypy.overrides]]
module = "psycopg2.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "aws_lambda_powertools.*"
ignore_missing_imports = true

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E501", "F841", "N806"]

[tool.ruff.lint.isort]
known-first-party = ["lambdas", "shared", "tests"]

[tool.ruff.format]
quote-style = "double"
