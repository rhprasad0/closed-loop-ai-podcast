<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}0 Stars, 10/10{% endblock %}</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-dim: #1f6feb;
            --star: #f0c24b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* ── Nav ── */
        nav {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }

        .nav-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 56px;
        }

        .nav-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        .nav-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: 12px;
        }

        /* ── Main content ── */
        main {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ── Footer ── */
        footer {
            background-color: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .footer-inner {
            max-width: 900px;
            margin: 0 auto;
        }

        footer a {
            color: var(--text-muted);
        }

        footer a:hover {
            color: var(--accent);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-inner">
            <span class="nav-title">0 Stars, 10/10</span>
            <span class="nav-subtitle">A multi-agent podcast pipeline</span>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-inner">
            Generated by a closed-loop multi-agent workflow &mdash;
            <a href="https://github.com/rpunt/closed-loop-ai-podcast" target="_blank" rel="noopener">view source</a>
        </div>
    </footer>
</body>
</html>
